
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section class="community-section">
      <h2>Community</h2>

      <form
        action="https://formsubmit.co/tanmaygupta818@gmail.com"
        method="POST"
      >
        <input type="text" name="name" placeholder="Your Name" required />

        <textarea
          name="message"
          placeholder="Write your message..."
          required
        ></textarea>

        <input type="hidden" name="_captcha" value="false" />

        <input type="hidden" name="_subject" value="New Community Message" />

        <button type="submit">Send Message</button>
      </form>
      <img src="images/community-bg.jpg.jpeg" class="section-image" />
      <script src="js/app.js"></script>
    </section>
  </body>
</html>
