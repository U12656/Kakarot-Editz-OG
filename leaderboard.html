
<!doctype html>
<html>
  <head>
    <title>Fan Leaderboard</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <h2>Fan Leaderboard</h2>

    <div class="leaderboard">
      <input type="text" id="fanName" placeholder="Enter your name" />

      <input
        type="text"
        id="fanChannel"
        placeholder="Your channel name (optional)"
      />

      <button onclick="addFan()">Join Leaderboard</button>

      <ul id="fanList"></ul>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
