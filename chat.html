<!doctype html>
<html>
  <head>
    <title>Kakarot Chat</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section class="chat-section">
      <h2>Live Chat</h2>

      <form
        action="https://formsubmit.co/tanmaygupta818@gmail.com"
        method="POST"
      >
        >
        <input type="text" name="name" placeholder="Your Name" required />

        <textarea
          name="chat"
          placeholder="Type your message..."
          required
        ></textarea>

        <input type="hidden" name="_captcha" value="false" />

        <input type="hidden" name="_subject" value="Live Chat Message" />

        <button type="submit">Send</button>
      </form>

      <img src="images/chat-bg.jpg.jpeg" class="section-image" />
    </section>
    <script src="js/app.js"></script>
  </body>
</html>
